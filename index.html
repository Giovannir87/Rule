<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Regolamento</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background:#000;
        color:#fff;
        font-family:Arial, Helvetica, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        position:relative;
        overflow:hidden;
    }

    /* Immagine di sfondo */
    body::before{
        content:"";
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background-image:url("MusaLogo.jpeg");
        background-repeat:no-repeat;
        background-position:center;
        background-size:contain;
        opacity:0.35; /* trasparenza: aumenta o diminuisci */
        z-index:0;
    }

    .container{
        text-align:center;
        position:relative;
        z-index:1;
    }

    h1{
        margin-bottom:20px;
        font-size:32px;
    }

    button{
        background:#fff;
        color:#000;
        border:none;
        padding:15px 40px;
        font-size:20px;
        border-radius:8px;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#ddd;
        transform:scale(1.05);
    }
</style>
</head>

<body>

<div class="container">
    <h1>Regolamento</h1>
    <button onclick="scaricaPDF()">DOWNLOAD</button>
</div>

<script>
function scaricaPDF() {
    const link = document.createElement("a");
    link.href = "REGOLAMENTO.pdf";
    link.download = "REGOLAMENTO.pdf";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
